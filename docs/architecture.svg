<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#2d2a24" flood-opacity="0.06"/>
    </filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#9b9488"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4285F4"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5cc4b8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e8710a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="8" fill="#faf9f5"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">System Architecture</text>

  <!-- ═══ CLIENT ═══ -->
  <rect x="20" y="55" width="180" height="200" rx="8" fill="white" stroke="#d0d0d0" filter="url(#shadow)"/>
  <rect x="20" y="55" width="180" height="28" rx="8" fill="#5a5549"/>
  <rect x="20" y="73" width="180" height="10" fill="#5a5549"/>
  <text x="110" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="white">Client</text>

  <text x="36" y="105" font-size="10" font-weight="600" fill="#2d2a24">Input</text>
  <text x="36" y="120" font-size="9" fill="#5a5549">PCM audio (16-bit 16kHz)</text>
  <text x="36" y="133" font-size="9" fill="#5a5549">Camera (768x768 JPEG 1fps)</text>
  <text x="36" y="146" font-size="9" fill="#5a5549">Image upload / Text</text>

  <line x1="36" y1="155" x2="184" y2="155" stroke="#ede8df"/>
  <text x="36" y="172" font-size="10" font-weight="600" fill="#2d2a24">Output</text>
  <text x="36" y="187" font-size="9" fill="#5a5549">Native audio (TTS)</text>
  <text x="36" y="200" font-size="9" fill="#5a5549">Text transcript</text>
  <text x="36" y="213" font-size="9" fill="#5a5549">Tool call events</text>

  <text x="110" y="248" text-anchor="middle" font-size="8" fill="#9b9488">Mobile / Desktop</text>

  <!-- Arrow: Client → Server -->
  <line x1="200" y1="145" x2="250" y2="145" stroke="#9b9488" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="225" y="138" text-anchor="middle" font-size="8" fill="#9b9488">WSS</text>

  <!-- ═══ CLOUD RUN (SERVER) ═══ -->
  <rect x="250" y="55" width="390" height="340" rx="8" fill="white" stroke="#d0d0d0" filter="url(#shadow)"/>
  <rect x="250" y="55" width="390" height="28" rx="8" fill="#4285F4"/>
  <rect x="250" y="73" width="390" height="10" fill="#4285F4"/>
  <text x="445" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="white">Cloud Run</text>

  <!-- FastAPI -->
  <rect x="268" y="95" width="354" height="36" rx="6" fill="#f0f4f8" stroke="#d0d8e0"/>
  <text x="445" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2a24">FastAPI + WebSocket</text>
  <text x="445" y="124" text-anchor="middle" font-size="8" fill="#9b9488">/ws/{user_id}/{session_id}</text>

  <!-- ADK Runner -->
  <rect x="268" y="143" width="170" height="60" rx="6" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="353" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2a24">ADK Runner</text>
  <text x="353" y="176" text-anchor="middle" font-size="8" fill="#5a5549">LiveRequestQueue</text>
  <text x="353" y="188" text-anchor="middle" font-size="8" fill="#5a5549">RunConfig (BIDI streaming)</text>

  <!-- SOP Router -->
  <rect x="452" y="143" width="170" height="60" rx="6" fill="#fff3e0" stroke="#ffcc80"/>
  <text x="537" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2a24">SOP Router</text>
  <text x="537" y="176" text-anchor="middle" font-size="8" fill="#5a5549">Domain selection</text>
  <text x="537" y="188" text-anchor="middle" font-size="8" fill="#e65100">SOP swap = domain swap</text>

  <!-- SOP: Wahoo -->
  <rect x="268" y="215" width="170" height="50" rx="6" fill="#fce4ec" stroke="#f48fb1"/>
  <text x="353" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#c62828">SOP: Wahoo KICKR</text>
  <text x="353" y="248" text-anchor="middle" font-size="8" fill="#5a5549">Casual tone · Cycling slang</text>

  <!-- SOP: Garmin -->
  <rect x="452" y="215" width="170" height="50" rx="6" fill="#e8eaf6" stroke="#9fa8da"/>
  <text x="537" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#283593">SOP: Garmin Watches</text>
  <text x="537" y="248" text-anchor="middle" font-size="8" fill="#5a5549">Tactical tone · Military language</text>

  <!-- Tools -->
  <text x="268" y="286" font-size="9" font-weight="600" fill="#2d2a24">Tools</text>

  <rect x="268" y="293" width="110" height="34" rx="6" fill="#e0f2f1" stroke="#80cbc4"/>
  <text x="323" y="310" text-anchor="middle" font-size="9" font-weight="500" fill="#00695c">google_search</text>
  <text x="323" y="322" text-anchor="middle" font-size="7" fill="#5a5549">ADK built-in</text>

  <rect x="388" y="293" width="110" height="34" rx="6" fill="#e0f2f1" stroke="#80cbc4"/>
  <text x="443" y="310" text-anchor="middle" font-size="9" font-weight="500" fill="#00695c">create_ticket</text>
  <text x="443" y="322" text-anchor="middle" font-size="7" fill="#5a5549">Custom + Resend</text>

  <rect x="508" y="293" width="110" height="34" rx="6" fill="#e0f2f1" stroke="#80cbc4"/>
  <text x="563" y="310" text-anchor="middle" font-size="9" font-weight="500" fill="#00695c">vision</text>
  <text x="563" y="322" text-anchor="middle" font-size="7" fill="#5a5549">Camera 768x768 1fps</text>

  <!-- Shared tools note -->
  <text x="445" y="350" text-anchor="middle" font-size="8" fill="#9b9488">Tools shared across all domains</text>

  <!-- Session store -->
  <rect x="268" y="360" width="354" height="24" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <text x="445" y="377" text-anchor="middle" font-size="9" fill="#5a5549">In-memory session + ticket store</text>

  <!-- ═══ EXTERNAL SERVICES ═══ -->

  <!-- Gemini Live API -->
  <rect x="700" y="55" width="240" height="110" rx="8" fill="white" stroke="#d0d0d0" filter="url(#shadow)"/>
  <rect x="700" y="55" width="240" height="28" rx="8" fill="#e8710a"/>
  <rect x="700" y="73" width="240" height="10" fill="#e8710a"/>
  <text x="820" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="white">Gemini Live API</text>
  <text x="820" y="100" text-anchor="middle" font-size="9" fill="#2d2a24">gemini-2.5-flash-native-audio</text>
  <text x="820" y="113" text-anchor="middle" font-size="8" fill="#5a5549">bidiGenerateContent streaming</text>
  <text x="820" y="126" text-anchor="middle" font-size="8" fill="#5a5549">Native audio out · Vision in</text>
  <text x="820" y="155" text-anchor="middle" font-size="8" fill="#9b9488">Audio + reasoning in one model</text>

  <!-- Arrow: Server → Gemini -->
  <line x1="640" y1="110" x2="700" y2="110" stroke="#e8710a" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="670" y="103" text-anchor="middle" font-size="8" fill="#9b9488">ADK</text>

  <!-- Google Search -->
  <rect x="700" y="190" width="240" height="75" rx="8" fill="white" stroke="#d0d0d0" filter="url(#shadow)"/>
  <rect x="700" y="190" width="240" height="28" rx="8" fill="#5cc4b8"/>
  <rect x="700" y="208" width="240" height="10" fill="#5cc4b8"/>
  <text x="820" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="white">Google Search</text>
  <text x="820" y="237" text-anchor="middle" font-size="8" fill="#5a5549">Support sites · YouTube · Forums</text>
  <text x="820" y="250" text-anchor="middle" font-size="8" fill="#5a5549">Real-time knowledge retrieval</text>

  <!-- Arrow: Server → Search -->
  <line x1="640" y1="227" x2="700" y2="227" stroke="#5cc4b8" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <text x="670" y="220" text-anchor="middle" font-size="8" fill="#9b9488">Tool</text>

  <!-- Resend -->
  <rect x="700" y="290" width="240" height="65" rx="8" fill="white" stroke="#d0d0d0" filter="url(#shadow)"/>
  <rect x="700" y="290" width="240" height="28" rx="8" fill="#5a5549"/>
  <rect x="700" y="308" width="240" height="10" fill="#5a5549"/>
  <text x="820" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="white">Resend</text>
  <text x="820" y="335" text-anchor="middle" font-size="8" fill="#5a5549">Branded HTML ticket emails</text>
  <text x="820" y="348" text-anchor="middle" font-size="8" fill="#5a5549">Visual record for camera sessions</text>

  <!-- Arrow: Server → Resend -->
  <line x1="640" y1="322" x2="700" y2="322" stroke="#5a5549" stroke-width="1.5"/>

  <!-- ═══ PROTOCOL LABELS ═══ -->
  <text x="480" y="500" text-anchor="middle" font-size="9" fill="#9b9488">Protocol: WebSocket (client ↔ server) · bidiGenerateContent (server ↔ Gemini) · HTTPS (Search, Resend)</text>
</svg>
