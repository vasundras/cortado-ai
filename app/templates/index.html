<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cortado — Multimodal Support Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="header-brand">
                    <img class="logo" src="/static/img/cortado-logo.png" alt="Cortado" style="width:32px;height:auto;">
                    <h1>Cortado</h1>
                </div>
                <div class="domain-selector">
                    <select id="domainSelect">
                        <option value="wahoo">Wahoo KICKR</option>
                        <option value="garmin">Garmin Watches</option>
                    </select>
                </div>
            </div>
            <p class="header-tagline">Multimodal Support — No Workflows, Just Answers</p>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <!-- Chat area -->
        <main class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <img class="welcome-icon" src="/static/img/cortado-logo.png" alt="Cortado" style="width:80px;height:auto;">
                <h2 id="welcomeTitle">Hey! I'm Cortado.</h2>
                <p id="welcomeDesc">I'm your Wahoo KICKR support agent. I can <strong>hear</strong> you, <strong>see</strong> your trainer, and <strong>read</strong> your docs.</p>
                <p class="welcome-hint" id="welcomeHint">Try: "My KICKR Core 2 won't connect to Zwift" or point your camera at your trainer.</p>
            </div>
            <div class="messages" id="messages"></div>
        </main>

        <!-- Camera preview (shown when camera is active) -->
        <div class="camera-preview" id="cameraPreview" style="display: none;">
            <video id="cameraVideo" autoplay playsinline muted></video>
            <canvas id="cameraCanvas" style="display: none;"></canvas>
            <button class="camera-close" id="cameraClose" title="Stop camera">✕</button>
        </div>

        <!-- Input area -->
        <footer class="input-area">
            <!-- Tool call indicator -->
            <div class="tool-indicator" id="toolIndicator" style="display: none;">
                <span class="tool-spinner"></span>
                <span class="tool-text" id="toolText">Searching the web...</span>
            </div>

            <!-- Media buttons -->
            <div class="input-controls">
                <button class="btn-media" id="btnMic" title="Voice input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>

                <button class="btn-media" id="btnCamera" title="Camera input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>

                <label class="btn-media" id="btnUpload" title="Upload image">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </label>

                <!-- Text input -->
                <div class="text-input-wrapper">
                    <input
                        type="text"
                        id="textInput"
                        placeholder="Describe your issue..."
                        autocomplete="off"
                    >
                    <button class="btn-send" id="btnSend" title="Send">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                    <button class="btn-stop" id="btnStop" title="Stop" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
